<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запити на дружбу</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; height: 100vh; overflow: hidden; }
        .app-container { display: flex; width: 100%; height: 100%; }
        
        .sidebar { width: 320px; background-color: var(--panel-bg); border-right: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; padding: 20px 0; }
        .user-profile { padding: 0 24px 20px 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 15px; display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; background: linear-gradient(135deg, #3b82f6, #1d4ed8); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; color: #fff; text-transform: uppercase; }
        .user-info h1 { font-size: 16px; font-weight: 600; }
        .user-info p { font-size: 13px; color: #10b981; margin-top: 2px; }
        
        nav { display: flex; flex-direction: column; gap: 4px; padding: 0 8px; flex-grow: 1; }
        nav a { display: flex; align-items: center; padding: 12px 16px; color: var(--text-color); text-decoration: none; border-radius: 10px; font-size: 15px; font-weight: 500; transition: background 0.2s; }
        nav a:hover { background-color: rgba(255, 255, 255, 0.05); }
        nav a.active { background-color: rgba(37, 99, 235, 0.2); color: #60a5fa; }
        nav a:last-child { margin-top: auto; color: #ef4444; }
        nav a:last-child:hover { background-color: rgba(239, 68, 68, 0.1); }

        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .content-container { width: 100%; max-width: 600px; }
        .page-title { font-size: 24px; font-weight: 600; margin-bottom: 24px; text-align: center; }

        .request-card { display: flex; align-items: center; justify-content: space-between; background: var(--panel-bg); padding: 16px 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 12px; }
        .request-info { display: flex; align-items: center; gap: 14px; }
        .request-avatar { width: 40px; height: 40px; background: #475569; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; text-transform: uppercase; }
        .request-text { font-size: 15px; font-weight: 500; }
        
        .actions-group { display: flex; gap: 8px; }
        .btn-action { border: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; color: white; }
        .btn-yes { background-color: #10b981; }
        .btn-no { background-color: #ef4444; }
        .btn-action:hover { opacity: 0.9; }
        .empty-state { text-align: center; color: var(--text-muted); margin-top: 40px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="user-profile">
                <div class="avatar">М</div>
                <div class="user-info">
                    <h1>макс</h1>
                    <p>онлайн</p>
                </div>
            </div>
            <nav>
                <a href="/search_friends">🔍 Пошук друзів</a>
                <a href="/my_friends">👥 Мої друзі</a>
                <a href="/friend_requests" class="active">📩 Запити на дружбу</a>
                <a href="/new_messages">💬 Нові повідомлення</a>
                <a href="/logout">🚪 Вихід</a>
            </nav>
        </div>

        <div class="main-content">
            <div class="content-container">
                <h2 class="page-title">Запити на дружбу</h2>
                <div class="requests-list">
                    {% for id, name in data.items() %}
                        <div class="request-card">
                            <div class="request-info">
                                <div class="request-avatar">{{ name[0] if name else 'R' }}</div>
                                <div class="request-text">Запит від користувача: <strong>{{ name }}</strong></div>
                            </div>
                            <div class="actions-group">
                                <form method="post" action="/friend_requests_confirm">
                                    <input type="hidden" name="id" value="{{ id }}">
                                    <input type="submit" name="result" value="yes" class="btn-action btn-yes">
                                </form>
                                <form method="post" action="/friend_requests_confirm">
                                    <input type="hidden" name="id" value="{{ id }}">
                                    <input type="submit" name="result" value="no" class="btn-action btn-no">
                                </form>
                            </div>
                        </div>
                    {% else %}
                        <p class="empty-state">Нових запитів на дружбу немає. 🙌</p>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
