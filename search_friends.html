<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пошук друзів</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --accent-color: #2563eb;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: #0f172a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; height: 100vh; overflow: hidden; }
        .app-container { display: flex; width: 100%; height: 100%; }
        
        /* Сайдбар зліва */
        .sidebar { width: 320px; background-color: var(--panel-bg); border-right: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; padding: 20px 0; }
        .user-profile { padding: 0 24px 20px 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 15px; display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; background: linear-gradient(135deg, #3b82f6, #1d4ed8); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; color: #fff; text-transform: uppercase; }
        .user-info h1 { font-size: 16px; font-weight: 600; }
        .user-info p { font-size: 13px; color: #10b981; margin-top: 2px; }
        
        nav { display: flex; flex-direction: column; gap: 4px; padding: 0 8px; flex-grow: 1; }
        nav a { display: flex; align-items: center; padding: 12px 16px; color: var(--text-color); text-decoration: none; border-radius: 10px; font-size: 15px; font-weight: 500; transition: background 0.2s; }
        nav a:hover { background-color: rgba(255, 255, 255, 0.05); }
        nav a.active { background-color: rgba(37, 99, 235, 0.2); color: #60a5fa; }
        nav a:last-child { margin-top: auto; color: #ef4444; }
        nav a:last-child:hover { background-color: rgba(239, 68, 68, 0.1); }

        /* Контент праворуч */
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .content-container { width: 100%; max-width: 500px; margin-top: 40px; }
        .page-title { font-size: 24px; font-weight: 600; margin-bottom: 24px; text-align: center; }
        
        /* Картка форми пошуку */
        .search-card { background: var(--panel-bg); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted); }
        
        .input-field { width: 100%; padding: 14px 16px; background-color: var(--input-bg); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; font-size: 15px; outline: none; transition: border-color 0.2s; }
        .input-field:focus { border-color: var(--accent-color); }
        
        .btn-submit { width: 100%; background-color: var(--accent-color); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-submit:hover { background-color: #3b82f6; }

        /* Спливаючі повідомлення про успіх або помилку */
        .flash-messages { margin-bottom: 15px; list-style: none; }
        .flash-message { background-color: rgba(37, 99, 235, 0.2); color: #60a5fa; padding: 12px; border-radius: 10px; font-size: 14px; text-align: center; border: 1px solid rgba(37, 99, 235, 0.3); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="user-profile">
                <div class="avatar">М</div>
                <div class="user-info">
                    <h1>макс</h1>
                    <p>онлайн</p>
                </div>
            </div>
            <nav>
                <a href="/search_friends" class="active">🔍 Пошук друзів</a>
                <a href="/my_friends">👥 Мої друзі</a>
                <a href="/friend_requests">📩 Запити на дружбу</a>
                <a href="/new_messages">💬 Нові повідомлення</a>
                <a href="/logout">🚪 Вихід</a>
            </nav>
        </div>

        <div class="main-content">
            <div class="content-container">
                <h2 class="page-title">Знайди нових друзів</h2>
                
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <ul class="flash-messages">
                            {% for message in messages %}
                                <li class="flash-message">{{ message }}</li>
                            {% endfor %}
                        </ul>
                    {% endif %}
                {% endwith %}

                <div class="search-card">
                    <form method="POST" action="/search_friends">
                        <div class="form-group">
                            <label class="form-label" for="username">Нікнейм користувача</label>
                            <input class="input-field" type="text" id="username" name="name" placeholder="Введіть ім'я..." required autocomplete="off">
                        </div>
                        <button class="btn-submit" type="submit">Надіслати запит на дружбу</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
